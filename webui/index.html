<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rail Control</title>
  <link rel="stylesheet" href="/style.css">
  <script>
    document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
  </script>
</head>
<body>
  <header class="topbar">
    <h1>Rail Control</h1>
    <div class="conn">
      <span id="mode-badge" class="badge">…</span>
      <span id="link-badge" class="badge">connecting…</span>
      <span id="settings-status" class="badge" hidden></span>
      <button class="btn-round" id="settings-save" title="Save current settings to config/settings.json">
        <span>💾</span><span>Save</span>
      </button>
      <button class="btn-round" id="settings-load" title="Reload settings from config/settings.json">
        <span>📂</span><span>Load</span>
      </button>
      <button class="btn-round" id="theme-toggle" title="Toggle light/dark theme">
        <span id="theme-icon">☀️</span><span id="theme-label">Light</span>
      </button>
    </div>
  </header>

  <!-- One panel per controller is generated by app.js from /api/config. -->
  <main id="panels"></main>

  <!-- Template for a single controller panel. -->
  <template id="panel-template">
    <section class="panel" data-controller>
      <div class="panel-head">
        <h2 class="panel-title"></h2>
        <div class="panel-flags">
          <span class="flag flag-conn">offline</span>
          <span class="flag flag-drive">idle</span>
          <span class="flag flag-pid">pid off</span>
          <span class="flag flag-homing">homing?</span>
          <span class="flag flag-down-limit">down limit set</span>
          <span class="flag flag-neg-limit">neg endstop</span>
          <span class="flag flag-pos-limit">pos endstop</span>
        </div>
      </div>

      <div class="panel-body">
        <!-- Manual drive (spring-return joystick built by app.js) -->
        <div class="card drive-card">
          <h3>Manual drive</h3>
          <div class="joy-mount"></div>
          <button class="estop">STOP</button>
        </div>

        <!-- PID tuning -->
        <div class="card pid-card">
          <h3>PID balance loop</h3>
          <div class="pid-params"></div>
          <div class="pid-actions">
            <button class="pid-toggle">Start PID</button>
          </div>
        </div>

        <!-- Parameters -->
        <div class="card param-card">
          <h3>Parameters</h3>
          <div class="params"></div>
        </div>

        <!-- Readout -->
        <div class="card readout-card">
          <h3>Live readout</h3>
          <table class="readout"><tbody></tbody></table>
          <p class="err-line"></p>
        </div>
      </div>
    </section>
  </template>

  <script src="/app.js"></script>
</body>
</html>
